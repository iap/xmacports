name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  XDG_CONFIG_HOME: ${{ runner.temp }}/.config
  XDG_CACHE_HOME: ${{ runner.temp }}/.cache
  XDG_DATA_HOME: ${{ runner.temp }}/.local/share
  XDG_STATE_HOME: ${{ runner.temp }}/.local/state
  DEBIAN_FRONTEND: noninteractive

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install system packages (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq python3 python3-yaml shellcheck git curl ca-certificates

      - name: Install shfmt (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          curl -fsSL --retry 3 --retry-delay 2 \
            "https://github.com/mvdan/sh/releases/download/v3.8.0/shfmt_v3.8.0_linux_amd64" \
            -o shfmt
          sudo mv shfmt /usr/local/bin/
          sudo chmod +x /usr/local/bin/shfmt

      - name: Install age and sops (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          curl -fsSL --retry 3 --retry-delay 2 \
            "https://github.com/FiloSottile/age/releases/download/v1.2.1/age-linux-amd64.tar.gz" \
            | tar xz
          sudo mv age age-keygen /usr/local/bin/
          sudo chmod +x /usr/local/bin/age /usr/local/bin/age-keygen

          curl -fsSL --retry 3 --retry-delay 2 \
            "https://github.com/getsops/sops/releases/download/v3.9.6/sops-v3.9.6-linux.amd64" \
            -o sops
          sudo mv sops /usr/local/bin/
          sudo chmod +x /usr/local/bin/sops

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update --quiet
          brew install age sops shellcheck shfmt

      - name: Generate age keypair (for secret tests)
        run: |
          mkdir -p "$XDG_CONFIG_HOME/sops/age"
          age-keygen -o "$XDG_CONFIG_HOME/sops/age/keys.txt"

      - name: Create XDG runtime directories
        run: |
          mkdir -p "$XDG_DATA_HOME" "$XDG_STATE_HOME/shell" "$XDG_STATE_HOME/bash" "$XDG_STATE_HOME/zsh" "$XDG_CACHE_HOME/shell" "$XDG_CACHE_HOME/logs" "$XDG_CACHE_HOME/ssh"

      - name: Run test suite
        run: |
          set -euo pipefail
          make test
          make verify
          make shellcheck
          make fmt-check
          make test-secrets
          make test-compliance
