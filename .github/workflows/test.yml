name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Cache mise
        uses: actions/cache@v4
        with:
          path: |
            ~/.local/share/mise/installs
            ~/.cache/mise
          key: mise-${{ runner.os }}-${{ hashFiles('.mise.toml') }}
          restore-keys: |
            mise-${{ runner.os }}-

      - name: Install mise and tools
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # Install mise
          if ! command -v mise >/dev/null 2>&1; then
            curl -fsSL https://mise.jdx.dev/install.sh | sh
          fi
          eval "$(mise activate bash)"
          mise reshim
          # Install tools from .mise.toml
          mise install

      - name: Activate mise and setup environment
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          eval "$(mise activate bash)"
          mise reshim

          export XDG_CONFIG_HOME="${XDG_CONFIG_HOME:-${RUNNER_TEMP:-/tmp}/.config}"
          export XDG_DATA_HOME="${XDG_DATA_HOME:-${RUNNER_TEMP:-/tmp}/.local/share}"
          export XDG_CACHE_HOME="${XDG_CACHE_HOME:-${RUNNER_TEMP:-/tmp}/.cache}"
          export XDG_STATE_HOME="${XDG_STATE_HOME:-${RUNNER_TEMP:-/tmp}/.local/state}"

          mkdir -p "$XDG_CONFIG_HOME/sops/age"
          mkdir -p "$XDG_CACHE_HOME/logs" "$XDG_CACHE_HOME/ssh" "$XDG_CACHE_HOME/shell"
          mkdir -p "$XDG_DATA_HOME/shell" "$XDG_STATE_HOME/shell"
          mkdir -p "$HOME/.local/share/mise/.cache" "$HOME/.local/share/mise/exe"

          age-keygen -o "$XDG_CONFIG_HOME/sops/age/keys.txt"

          echo "XDG_CONFIG_HOME=$XDG_CONFIG_HOME" >> "$GITHUB_ENV"
          echo "XDG_DATA_HOME=$XDG_DATA_HOME" >> "$GITHUB_ENV"
          echo "XDG_CACHE_HOME=$XDG_CACHE_HOME" >> "$GITHUB_ENV"
          echo "XDG_STATE_HOME=$XDG_STATE_HOME" >> "$GITHUB_ENV"
          echo "MISE_ACTIVATED=true" >> "$GITHUB_ENV"

      - name: Install system packages (Ubuntu)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          for i in {1..5}; do
            if sudo apt-get update -qq; then break; fi
            echo "apt update failed, retrying in 10s... (attempt $i/5)"
            sleep 10
          done
          sudo apt-get install -y -qq python3 python3-yaml git curl ca-certificates zsh

      - name: Setup MacPorts (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          if [[ -d /opt/local/bin ]]; then
            echo "/opt/local/bin" >> "$GITHUB_PATH"
            echo "/opt/local/sbin" >> "$GITHUB_PATH"
          fi

      - name: Shell syntax tests
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          eval "$(mise activate bash)"
          mise exec -- make test

      - name: Dotfiles verification
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          eval "$(mise activate bash)"
          mkdir -p "$HOME/bin" "$HOME/.local/bin"
          mise exec -- make verify

      - name: Shellcheck
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          eval "$(mise activate bash)"
          mise exec -- make shellcheck

      - name: shfmt check
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          eval "$(mise activate bash)"
          mise exec -- make fmt-check

      - name: Secret management tests
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
          SOPS_AGE_KEY_FILE: ${{ env.XDG_CONFIG_HOME }}/sops/age/keys.txt
          DOTFILES_ROOT: ${{ github.workspace }}
        run: |
          set -euo pipefail
          eval "$(mise activate bash)"
          mise exec -- make test-secrets

      - name: Compliance check
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
          DOTFILES_ROOT: ${{ github.workspace }}
        run: |
          set -euo pipefail
          eval "$(mise activate bash)"
          mise exec -- make test-compliance

      - name: Log runner summary
        if: always()
        shell: bash
        run: |
          echo "runner.os=${{ runner.os }}"
          echo "XDG_CONFIG_HOME=${XDG_CONFIG_HOME:-}"
          echo "XDG_CACHE_HOME=${XDG_CACHE_HOME:-}"
          echo "XDG_DATA_HOME=${XDG_DATA_HOME:-}"
          echo "XDG_STATE_HOME=${XDG_STATE_HOME:-}"
          echo "workspace=${{ github.workspace }}"
          ls -la "$HOME/.local/share/mise" || true
          ls -la "$HOME/.local/share/mise/shims" || true
          ls -la "$XDG_DATA_HOME/shell" "$XDG_STATE_HOME/shell" "$XDG_CACHE_HOME/shell" "$XDG_CACHE_HOME/logs" 2>/dev/null || true