name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq python3 python3-yaml shellcheck shfmt age sops git
      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install age sops shellcheck shfmt
      - name: Generate age keypair (for secret tests)
        env:
          XDG_CONFIG_HOME: ${{ runner.temp }}/.config
        run: |
          mkdir -p "$XDG_CONFIG_HOME/sops/age"
          age-keygen -o "$XDG_CONFIG_HOME/sops/age/keys.txt"
      - name: Run test suite
        env:
          XDG_CONFIG_HOME: ${{ runner.temp }}/.config
          XDG_CACHE_HOME: ${{ runner.temp }}/.cache
          XDG_DATA_HOME: ${{ runner.temp }}/.local/share
          XDG_STATE_HOME: ${{ runner.temp }}/.local/state
        run: |
          make test
          make verify
          make shellcheck
          make fmt-check
          make test-secrets
          make test-compliance
