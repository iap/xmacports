kind: pipeline
name: default
type: docker

trigger:
  event:
    - push
    - pull_request

steps:
  - name: test
    image: alpine:latest
    commands:
      - apk add --no-cache bash git python3 py3-pyyaml zsh make curl ca-certificates age
      - curl -fsSL https://github.com/getsops/sops/releases/latest/download/sops-v3.13.3.linux.amd64 -o /usr/local/bin/sops
      - chmod +x /usr/local/bin/sops
      - make test
