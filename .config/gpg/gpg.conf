# GPG configuration for secure development environment
# Backward-compatible with GPG 2.0+ for older devices
# Optimized for MacBook Air 2017 and similar legacy hardware

# === ALGORITHM PREFERENCES ===
# Use strongest available algorithms (compatible with GPG 2.0+)
personal-cipher-preferences AES256 AES192 AES CAST5 3DES
personal-digest-preferences SHA512 SHA384 SHA256 SHA1
personal-compress-preferences ZLIB BZIP2 ZIP Uncompressed
default-preference-list SHA512 SHA384 SHA256 SHA1 AES256 AES192 AES CAST5 3DES ZLIB BZIP2 ZIP Uncompressed

# === CRYPTOGRAPHIC SETTINGS ===
# Strong hashing with fallback support
cert-digest-algo SHA512
s2k-digest-algo SHA512
s2k-cipher-algo AES256
# Moderate s2k-count for older hardware compatibility
s2k-count 1048576

# === DISPLAY AND OUTPUT ===
# Enhanced key display (compatible across versions)
keyid-format 0xlong
with-fingerprint
# Conditional options for better compatibility
list-options show-uid-validity
verify-options show-uid-validity

# Clean output format
armor
no-greeting
no-version
no-comments

# === KEYSERVER CONFIGURATION ===
# Fallback keyserver configuration for older GPG versions
keyserver hkps://keys.openpgp.org
# Basic keyserver options for maximum compatibility
keyserver-options timeout=10

# === TRUST AND VALIDATION ===
# Use PGP trust model for broader compatibility
# (tofu+pgp requires GPG 2.1.10+)
trust-model pgp

# === SECURITY HARDENING ===
# Conservative security settings for compatibility
# weak-digest SHA1  # Commented out for older GPG compatibility

# Basic privacy protection
throw-keyids

# === AGENT CONFIGURATION ===
use-agent

# === COMPATIBILITY NOTES ===
# This configuration prioritizes compatibility over maximum security
# Advanced users can uncomment stronger options if using GPG 2.2+:
#
# For GPG 2.2+:
# no-emit-version
# disable-cipher-algo IDEA,3DES,CAST5
# weak-digest SHA1
#
# For GPG 2.1.10+:
# trust-model tofu+pgp
# require-secmem
#
# For GPG 2.1+:
# with-subkey-fingerprint
# keyserver-options no-honor-keyserver-url,no-auto-key-retrieve
# expert
# allow-freeform-uid
