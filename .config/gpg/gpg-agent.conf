# GPG Agent configuration for secure development environment
# Optimized for GUI pinentry and software keys only

# === CACHE SETTINGS ===
default-cache-ttl 300
max-cache-ttl 3600
default-cache-ttl-ssh 300
max-cache-ttl-ssh 3600

# === PASSPHRASE HANDLING ===
allow-preset-passphrase

# === SECURITY OPTIONS ===
allow-loopback-pinentry

# === PINENTRY CONFIGURATION ===
# Use fallback script for robust pinentry selection
pinentry-program ~/.dotfiles/bin/pinentry-fallback

# === SSH INTEGRATION ===
enable-ssh-support

# === PERFORMANCE OPTIMIZATION ===
no-grab

# === DISABLE UNUSED FEATURES ===
# Disable smart card support entirely
disable-scdaemon
