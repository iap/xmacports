# GPG Agent configuration for secure development environment
# Backward-compatible with GPG 2.0+ for older devices
# Optimized for MacBook Air 2017 and similar legacy hardware

# === CACHE SETTINGS ===
# Balance security and usability for development workflow
# Conservative timeouts for older hardware and better security
default-cache-ttl 600
max-cache-ttl 7200
# SSH key caching (available in GPG 2.1+)
default-cache-ttl-ssh 600
max-cache-ttl-ssh 7200

# === PASSPHRASE HANDLING ===
# Allow preset passphrases for automation (GPG 2.1+)
# Comment out if using GPG 2.0.x
allow-preset-passphrase

# === SECURITY OPTIONS ===
# Basic security settings for maximum compatibility
# allow-loopback-pinentry requires GPG 2.1+
allow-loopback-pinentry

# Conservative security (compatible with older versions)
# no-allow-external-cache
# no-allow-mark-trusted

# === PINENTRY CONFIGURATION ===
# Use fallback script that handles different pinentry locations
# This script will work across different MacPorts/Homebrew setups
pinentry-program ~/.dotfiles/bin/pinentry-fallback

# === SSH INTEGRATION ===
# Enable SSH support for GPG keys (GPG 2.1+)
# Comment out if using GPG 2.0.x
enable-ssh-support

# === PERFORMANCE OPTIMIZATION ===
# Basic optimization for older hardware
no-grab

# === COMPATIBILITY NOTES ===
# This configuration works with GPG 2.0+ for maximum compatibility
# Advanced users with newer GPG versions can uncomment:
#
# For GPG 2.1+:
# no-allow-external-cache
# no-allow-mark-trusted
#
# For GPG 2.2+:
# Additional security hardening options available
#
# === LOGGING AND DEBUGGING ===
# Uncomment for troubleshooting (remember to comment out in production)
# log-file ~/.cache/logs/gpg-agent.log
# debug-level basic
