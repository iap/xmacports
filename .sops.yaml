# SOPS configuration for age-based encryption
# https://github.com/getsops/sops
#
# This file defines encryption rules for secrets stored in this repository.
# The public age key below determines who can decrypt the encrypted files.

creation_rules:
  - path_regex: secrets/.*\.enc\.yaml$
    age: age1gptsedytxyrn7havhaf82fexlml3jque7g85w6ewgyapcjetyddqwxnmft

# optional: enforced file matching for extra safety
# encrypted_regex: ^(secrets/.*\.enc\.yaml)$
